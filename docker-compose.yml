x-airflow-common:
  &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
  env_file:
    - path: .env
      required: false
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - airflow-logs-volume:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
  group_add:
    - "${DOCKER_GID:-101}"
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: s3
      DEBUG: "${LOCALSTACK_DEBUG:-0}"
      AWS_DEFAULT_REGION: "${S3_REGION:-eu-central-1}"
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-test}"
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3api list-buckets >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  localstack-s3-init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_DEFAULT_REGION: "${S3_REGION:-eu-central-1}"
      AWS_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-test}"
      S3_BUCKET: "${S3_BUCKET:-external-downloads}"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        endpoint="http://localstack:4566"
        bucket="$${S3_BUCKET}"
        region="$${AWS_DEFAULT_REGION}"

        if aws --endpoint-url "$$endpoint" s3api head-bucket --bucket "$$bucket" >/dev/null 2>&1; then
          echo "Bucket already exists: $$bucket"
          exit 0
        fi

        if [ "$$region" = "us-east-1" ]; then
          aws --endpoint-url "$$endpoint" s3api create-bucket --bucket "$$bucket"
        else
          aws --endpoint-url "$$endpoint" s3api create-bucket \
            --bucket "$$bucket" \
            --create-bucket-configuration LocationConstraint="$$region"
        fi

        echo "Created bucket: $$bucket"
    restart: "no"

  s3-gui:
    build:
      context: ./s3-gui
      dockerfile: Dockerfile
    depends_on:
      localstack-s3-init:
        condition: service_completed_successfully
    environment:
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID:-test}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY:-test}"
      S3_BUCKET_NAME: "${S3_BUCKET:-external-downloads}"
      S3_REGION: "${S3_REGION:-eu-central-1}"
      S3_ENDPOINT_URL: "${S3_ENDPOINT_URL:-http://localstack:4566}"
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "${S3_GUI_PORT:-3000}:3000"

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username "${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
          --password "${_AIRFLOW_WWW_USER_PASSWORD:-airflow}" \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.com
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      localstack-s3-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\"",
        ]
      interval: 20s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      localstack-s3-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume:
  airflow-logs-volume:
  localstack-data:
