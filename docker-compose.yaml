services:
  localstack:
    image: localstack/localstack:latest
    environment:
      SERVICES: s3
      DEBUG: "${LOCALSTACK_DEBUG:-0}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-eu-central-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "awslocal s3api list-buckets >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  localstack-s3-init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-eu-central-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
      S3_BUCKET: "${S3_BUCKET:-external-downloads}"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -eu
        endpoint="http://localstack:4566"
        bucket="$${S3_BUCKET}"
        region="$${AWS_DEFAULT_REGION}"

        if aws --endpoint-url "$$endpoint" s3api head-bucket --bucket "$$bucket" >/dev/null 2>&1; then
          echo "Bucket already exists: $$bucket"
          exit 0
        fi

        if [ "$$region" = "us-east-1" ]; then
          aws --endpoint-url "$$endpoint" s3api create-bucket --bucket "$$bucket"
        else
          aws --endpoint-url "$$endpoint" s3api create-bucket \
            --bucket "$$bucket" \
            --create-bucket-configuration LocationConstraint="$$region"
        fi

        echo "Created bucket: $$bucket"
    restart: "no"

  s3-gui:
    build:
      context: ./s3-gui
      dockerfile: Dockerfile
    depends_on:
      localstack-s3-init:
        condition: service_completed_successfully
    environment:
      S3_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-test}"
      S3_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-test}"
      S3_BUCKET_NAME: "${S3_BUCKET:-external-downloads}"
      S3_REGION: "${AWS_DEFAULT_REGION:-eu-central-1}"
      S3_ENDPOINT_URL: "${AWS_ENDPOINT_URL_S3:-http://localstack:4566}"
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "${S3_GUI_PORT:-3000}:3000"

volumes:
  localstack-data:
